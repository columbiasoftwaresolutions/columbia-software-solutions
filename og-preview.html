<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG preview — screenshot me at 1200x630</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap");

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: "Space Grotesk", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
        position: relative;
      }

      .glow {
        position: absolute;
        width: 900px;
        height: 900px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.22) 0%, transparent 70%);
        top: -200px;
        right: -200px;
        pointer-events: none;
      }

      .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        color: #6366f1;
        letter-spacing: 3px;
        margin-bottom: 28px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 92px;
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: -3px;
        margin-bottom: 28px;
      }

      .accent {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .sub {
        font-size: 26px;
        color: #999;
        max-width: 820px;
        line-height: 1.5;
      }

      .footer-row {
        position: absolute;
        left: 80px;
        right: 80px;
        bottom: 64px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        color: #666;
      }

      .footer-row .brand .accent {
        color: #6366f1;
        -webkit-text-fill-color: #6366f1;
        background: none;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="tag">Columbia Software Solutions</div>
    <h1>
      Columbia students<br />building <span class="accent">software.</span>
    </h1>
    <div class="sub">
      Building software for NYC nonprofits, small businesses, and startups.
    </div>
    <div class="footer-row">
      <span class="brand"><span class="accent">CSS</span> / columbiasoftwaresolutions.netlify.app</span>
      <span>2026</span>
    </div>
  </body>
</html>
